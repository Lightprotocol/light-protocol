name: forester-tests

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "forester/**"
      - "forester-utils/**"
      - "sdk-libs/photon-api/**"
      - "programs/**"
      - "program-libs/batched-merkle-tree/**"
      - "scripts/**"
      - ".github/workflows/forester-tests.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "forester/**"
      - "forester-utils/**"
      - "sdk-libs/photon-api/**"
      - "programs/**"
      - "program-libs/batched-merkle-tree/**"
      - "scripts/**"
      - ".github/workflows/forester-tests.yml"
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: "1"
  RUSTFLAGS: "--cfg tokio_unstable -D warnings"
  TEST_MODE: "local"
  TEST_V1_STATE: "true"
  TEST_V2_STATE: "true"
  TEST_V1_ADDRESS: "true"
  TEST_V2_ADDRESS: "true"
  FORESTER_ENABLE_COMPRESSIBLE: "true"

jobs:
  test:
    name: Forester e2e test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      redis:
        image: redis:8.0.1
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup and build
        uses: ./.github/actions/setup-and-build
        with:
          skip-components: "redis,go"
          cache-key: "rust"

      - name: Check available disk space
        shell: bash
        run: |
          df -h /
          du -sh /home/runner/work/* | sort -hr | head -n 10

      - name: Build CLI
        run: just cli build

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p forester
          if ! just forester test 2>&1 | tee forester/ci.log; then
            echo "=== validator rpc health after test failure ==="
            curl -sS -m 5 http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getSlot"}' || true
            echo
            echo "=== validator processes after test failure ==="
            pgrep -af "surfpool|solana-test-validator" || true
            echo "=== validator listeners after test failure ==="
            ss -lntp | grep -E '(:8899|:8900)' || true
            echo "=== dumping local validator transactions ==="
            cargo xtask dump-local-transactions \
              --rpc-url http://localhost:8899 \
              --output-folder forester/validator-transactions || true
            exit 1
          fi

      - name: Dump Photon Logs On Failure
        if: failure()
        shell: bash
        run: |
          mapfile -t photon_logs < <(find . -path "*/test-ledger/photon.log" -type f | sort)
          if [ "${#photon_logs[@]}" -gt 0 ]; then
            for log in "${photon_logs[@]}"; do
              echo "=== ${log} (tail -n 400) ==="
              tail -n 400 "${log}"
              echo "=== end ${log} ==="
            done
          else
            echo "No photon.log files found under any test-ledger directory"
          fi

      - name: Build Photon Gap Summary
        if: always()
        shell: bash
        run: |
          mkdir -p forester
          python3 - <<'PY'
          from collections import deque
          from pathlib import Path

          output_path = Path("forester/photon-gap-summary.txt")
          photon_logs = sorted(Path(".").glob("**/test-ledger/photon.log"))
          surfpool_logs = sorted(Path(".").glob("**/test-ledger/surfpool.log"))

          def relevant_lines(path: Path, patterns: tuple[str, ...], last_indexed_count: int = 0) -> list[str]:
              matches = []
              indexed = deque(maxlen=last_indexed_count)
              with path.open("r", encoding="utf-8", errors="replace") as handle:
                  for raw_line in handle:
                      line = raw_line.rstrip("\n")
                      if last_indexed_count and "Indexed slot " in line:
                          indexed.append(line)
                      if any(pattern in line for pattern in patterns):
                          matches.append(line)
              result = []
              if indexed:
                  result.append("Last indexed slot lines:")
                  result.extend(indexed)
              result.extend(matches[-200:])
              return result

          with output_path.open("w", encoding="utf-8") as output:
              if not photon_logs and not surfpool_logs:
                  output.write("No Photon or Surfpool logs found under any test-ledger directory.\n")
              for log_path in photon_logs:
                  output.write(f"=== {log_path} ===\n")
                  lines = relevant_lines(
                      log_path,
                      (
                          "Sequence gap detected",
                          "Failed to index block batch",
                          "Skipping failed transaction",
                      ),
                      last_indexed_count=10,
                  )
                  if lines:
                      output.write("\n".join(lines))
                      output.write("\n")
                  else:
                      output.write("No gap-related lines found.\n")
              for log_path in surfpool_logs:
                  output.write(f"=== {log_path} ===\n")
                  lines = relevant_lines(
                      log_path,
                      (
                          "Transaction execution failed",
                          "Transaction simulation failed",
                          "custom program error",
                      ),
                  )
                  if lines:
                      output.write("\n".join(lines))
                      output.write("\n")
                  else:
                      output.write("No Surfpool transaction failure lines found.\n")
          PY
          echo "=== forester/photon-gap-summary.txt ==="
          cat forester/photon-gap-summary.txt
          echo "=== end forester/photon-gap-summary.txt ==="

      - name: Upload Forester Test Logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: forester-test-ledger
          path: |
            forester/ci.log
            test.log
            forester/test.log
            forester/photon-gap-summary.txt
            forester/validator-transactions
            test-ledger
            forester/test-ledger
          if-no-files-found: ignore

  compressible-tests:
    name: Forester compressible tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      redis:
        image: redis:8.0.1
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RUST_LOG: forester=debug,light_client=debug
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup and build
        uses: ./.github/actions/setup-and-build
        with:
          skip-components: "go"
          cache-key: "rust"

      - name: Build CLI
        run: just cli build

      - name: Test compressible PDA
        run: just forester test-compressible-pda

      - name: Test compressible Mint
        run: just forester test-compressible-mint

      - name: Test compressible ctoken
        run: just forester test-compressible-ctoken
