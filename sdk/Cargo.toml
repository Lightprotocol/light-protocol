[package]
name = "light-sdk"
version = "0.2.1"
description = "ZK Compression on Solana"
repository = "https://github.com/Lightprotocol/light-protocol"
license = "Apache-2.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "light_sdk"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
custom-heap = ["light-heap"]
mem-profiling = []
default = ["custom-heap"]
test-sbf = []
bench-sbf = []
cpi-context = []

[dependencies]
account-compression = { workspace = true }
aligned-sized = { workspace = true }
anchor-lang = { workspace = true }
borsh = { workspace = true }
bytemuck = { workspace = true }
groth16-solana = { workspace = true }
light-concurrent-merkle-tree = { workspace = true }
light-hasher = { workspace = true }
light-heap = { workspace = true, optional = true }
light-macros = { workspace = true }
light-system-program = { workspace = true }
light-utils = { workspace = true }
light-verifier = { workspace = true }

[target.'cfg(not(target_os = "solana"))'.dependencies]
solana-sdk = { workspace = true }

[dev-dependencies]
solana-banks-interface = { workspace = true }
solana-cli-output = { workspace = true }
solana-program-test = { workspace = true }
solana-sdk = { workspace = true }
serde_json = "1.0.114"
reqwest = "0.12"
tokio = "1.36.0"
light-prover-client = { version = "0.2.1", path = "../circuit-lib/light-prover-client" }
light-merkle-tree-reference = { version = "0.2.1", path = "../merkle-tree/reference/" }
light-indexed-merkle-tree = { version = "0.2.1", path = "../merkle-tree/indexed/" }
num-bigint = "0.4.4"
num-traits = "0.2.18"
lazy_static = "1.4.0"
light-hash-set = { version = "0.2.1", path = "../merkle-tree/hash-set", features = ["solana"] }
rand = "0.8.5"
